<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<title>JnWebPlayer</title>
		<!-- 引入播放器核心库 -->
		<script src="./JnWebPlayer.js"></script>
		<!-- 按需引入语音对讲库 -->
		<script src="./JnWebPlayerTalk.js"></script>
		<style>
			* {
				box-sizing: border-box;
				position: relative;
			}

			body {
				margin: 0;
				width: 100vw;
				height: 100vh;
				overflow: hidden;
			}

			.player {
				width: 100%;
				height: 100%;
			}

			.playerMsg {
				position: absolute;
				inset: 0;
				z-index: 54321;
				display: flex;
				flex-wrap: wrap;
				text-align: center;
				font-size: 20px;
				letter-spacing: 0.05em;
				background: #000a;
				color: #fff5;
				justify-content: center;
				align-items: center;
				padding: 20px;

				display: none;
			}
		</style>
	</head>

	<body>
		<!-- 播放器容器 -->
		<div class="player">
			<div class="playerMsg"></div>
		</div>

		<script>
			;(function () {
				// url解析
				let props = Object.fromEntries(new URLSearchParams(location.search).entries())
				props.url = props.url || '' //流地址
				props.params = JSON.parse(props.params || '{}') /*国标参数 (url有值时此项失效), 格式:{
				'deviceId'    设备id (必需)
				'channelId'  通道id (必需)
				'name'      名称
			} */
				props.options = JSON.parse(props.options || '{}') //JnWebPlayer播放器选项

				// 参数校验
				let playerMsg = document.querySelector('.playerMsg')
				if (!props.url && !(props.params.deviceId && props.params.channelId)) {
					playerMsg.innerHTML = '参数错误'
					playerMsg.style.display = 'flex'
					return
				}

				// 参数预设
				let options = {}
				if (props.url) {
					options = {
						operateBtns: {
							play: false, //是否显示播放暂停按钮
							ptz: false, //是否显示PTZ云台按钮
							meeting: false, //是否显示会议按钮
							talk: false, //是否显示语音对讲按钮
						},
						debug: true,
					}
				} else {
					options = {
						operateBtns: {
							play: false, //是否显示播放暂停按钮
						},
						debug: true,
					}
				}

				// 参数合并
				for (let key in props.options) {
					if (Object.prototype.toString.call(options[key]) == '[object Object]') {
						for (let k in props.options[key]) {
							options[key] = options[key] || {}
							options[key][k] = props.options[key][k]
						}
					} else {
						options[key] = props.options[key]
					}
				}

				// 播放器初始化
				let player = JnWebPlayer.init('.player', options)
				// 播放
				player.play(props.url || props.params)

				// player.on('timeUpdate', sss => {
				// 	console.log('timeUpdate', sss) //视频原始时间戳, 疑似从视频流开始产生到现在的毫秒值
				// })
				// player.on('timePast', sss => {
				// 	console.log('timePast', sss) //优化后的时间戳, 从开始播放到现在的毫秒值
				// })
				// player.on('meeting', () => {
				// 	console.log('meeting')
				// })

				// // 销毁
				// player.destroy()
			})()
		</script>
	</body>
</html>
