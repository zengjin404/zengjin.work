<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport"
	      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>简单示例</title>
	<script src="../JnWebPlayer.js"></script>
	<script src="../JnWebPlayerTalk.js"></script>
	<style>
		* {
			box-sizing: border-box;
			position: relative;
		}

		body {
			margin: 0;
			width: 100vw;
			height: 100vh;
			padding: 16px;
			overflow: hidden;
		}

		.player {
			width: 100%;
			height: 100%;
			border-radius: 4px;
		}
	</style>
</head>
<body>

<div class="player"></div>

<script>
	// JnWebPlayer.settings.BMS =  'http://192.168.1.202:8816'
	// JnWebPlayer.settings.BMS =  'http://172.20.96.161:8816'    //文旅正式
	 JnWebPlayer.settings.BMS =  'http://192.168.1.18:8816'    //测试线
	// JnWebPlayer.settings.BMS =  'https://172.20.96.197:8815'  //民宗正式

	let _player = JnWebPlayer.init('.player')   //初始化播放器(传入容器的选择器或dom)

	// _player.play('37130200001310878512')    //播放(传入通道id)默认
	// _player.play('37132502121326010091')    //播放(传入通道id)民宗
	 _player.play('37130100001320001339')    //播放(传入通道id)测试线
	// _player.play('37132368001320002515')    //播放(传入通道id)文旅正式

</script>
</body>
</html>
